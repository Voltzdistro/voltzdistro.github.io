<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get All Courses</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Get All Courses</h1>

    <!-- Course Selection Section -->
    <section class="course-options">
        <h2>Choose Your Course</h2>

        <form action="confirm_payment.html" method="get">
            <h3>6-Week Program</h3>
            <label>
                <input type="checkbox" name="course" value="6-week-basic">
                Basic - ₦12,000 / $7.29
            </label><br>
            <label>
                <input type="checkbox" name="course" value="6-week-premium">
                Premium - ₦16,000 / $9.72
            </label><br>

            <h3>8-Week Program</h3>
            <label>
                <input type="checkbox" name="course" value="8-week-basic">
                Basic - ₦19,900 / $12.09
            </label><br>
            <label>
                <input type="checkbox" name="course" value="8-week-premium">
                Premium - ₦25,000 / $15.19
            </label><br>

            <!-- Discount Information -->
            <p><strong>Special Discounts:</strong></p>
            <ul>
                <li>30% off for the first 20 sign-ups</li>
                <li>40% off for those who refer a friend who also joins</li>
            </ul>

            <!-- Submit Button -->
            <input type="submit" value="Proceed to Payment">
        </form>
    </section>
</body>
</html>
